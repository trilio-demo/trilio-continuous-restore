# Grants anyuid SCC to the wordpress ServiceAccount.
# This replaces the manual: oc adm policy add-scc-to-user anyuid -z default
# The wordpress:4.8-apache image runs as root (Apache default), which OpenShift
# blocks unless anyuid is explicitly granted to the pod's ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wordpress-anyuid
  namespace: {{ .Values.namespace }}
  labels:
    app: wordpress
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Values.namespace }}
