apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: trilio-s3-credentials
  namespace: trilio-system
spec:
  # 5m so that if Vault is populated after initial sync, the Secret and
  # Target recover quickly without waiting a full hour.
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: aws-s3-login
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        accessKey: "{{ `{{ .accessKey }}` }}"
        secretKey: "{{ `{{ .secretKey }}` }}"
  data:
    - secretKey: accessKey
      remoteRef:
        key: secret/global/trilio-s3
        property: accessKey
    - secretKey: secretKey
      remoteRef:
        key: secret/global/trilio-s3
        property: secretKey
