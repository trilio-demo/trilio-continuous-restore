apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: trilio-license
  namespace: trilio-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: trilio-license
    creationPolicy: Owner
  data:
    # 5.2.x License Job reads data.key
    - secretKey: key
      remoteRef:
        key: secret/global/trilio-license
        property: key
    # 5.3.x webhook reads data.trilioLicense
    - secretKey: trilioLicense
      remoteRef:
        key: secret/global/trilio-license
        property: key
