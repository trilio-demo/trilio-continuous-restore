clusterGroup:
  name: hub
  # Namespace is a dictionary for easier overriding (lists are supported as well)
  namespaces:
    open-cluster-management:
    vault:
    golang-external-secrets:
    trilio-system:
      operatorGroup: true
      targetNamespaces: []
    wordpress:
    wordpress-restore:
  subscriptions:
    acm:
      name: advanced-cluster-management
      namespace: open-cluster-management
      channel: release-2.14
      # csv: advanced-cluster-management.v2.6.1
    trilio:
      name: k8s-triliovault
      namespace: trilio-system
      channel: 5.3.x
      source: certified-operators
      installPlanApproval: Automatic
  argoProjects:
    - hub
    - trilio-operand
    - wordpress
    - wordpress-restore
  # Explicitly mention the cluster-state based overrides we plan to use for this pattern.
  # We can use self-referential variables because the chart calls the tpl function with these variables defined
  sharedValueFiles:
    - '/overrides/values-{{ $.Values.global.clusterPlatform }}.yaml'
    - '/overrides/values-{{ $.Values.global.clusterVersion }}-{{ $.Values.clusterGroup.name }}.yaml'
  # sharedValueFiles is a flexible mechanism that will add the listed valuefiles to every app defined in the
  # applications section. We intend this to supplement and possibly even replace previous "magic" mechanisms, though
  # we do not at present have a target date for removal.
  #
  # To replicate the "classic" magic include structure, the clusterGroup would need all of these
  # sharedValueFiles, in this order:
  #   - '/overrides/values-{{ $.Values.global.clusterPlatform }}.yaml'
  #   - '/overrides/values-{{ $.Values.global.clusterPlatform }}-{{ $.Values.global.clusterVersion }}.yaml'
  #   - '/overrides/values-{{ $.Values.global.clusterPlatform }}-{{ $.Values.clusterGroup.name }}.yaml'
  #   - '/overrides/values-{{ $.Values.global.clusterVersion }}-{{ $.Values.clusterGroup.name }}.yaml"
  #   - '/overrides/values-{{ $.Values.global.localClusterName }}.yaml'

  # This kind of variable substitution will work with any of the variables the Validated Patterns operator knows
  # about and sets, so this is also possible, for example:
  #   - '/overrides/values-{{ $.Values.global.hubClusterDomain }}.yaml'
  #   - '/overrides/values-{{ $.Values.global.localClusterDomain }}.yaml'
  applications:
    acm:
      name: acm
      namespace: open-cluster-management
      argoProject: hub
      chart: acm
      chartVersion: 0.1.*
    vault:
      name: vault
      namespace: vault
      argoProject: hub
      chart: hashicorp-vault
      chartVersion: 0.1.*
    golang-external-secrets:
      name: golang-external-secrets
      namespace: golang-external-secrets
      argoProject: hub
      chart: golang-external-secrets
      chartVersion: 0.1.*
    # Req 10 (Option A): trilio-secrets at wave -1 ensures ESO creates S3 and
    # license Secrets before trilio-operand (wave 0) applies the BackupTarget.
    # Mirrors the spoke config. Brief delete/recreate of ExternalSecrets during
    # first sync after this change is added — self-heals within ~60s.
    trilio-secrets:
      name: trilio-secrets
      namespace: trilio-system
      argoProject: trilio-operand
      path: charts/all/trilio-secrets
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
    trilio-operand:
      name: trilio-operand
      namespace: trilio-system
      argoProject: trilio-operand
      path: charts/all/trilio-operand
      overrides:
        - name: backupTarget.bucketName
          value: sa-demo-2
        - name: backupTarget.region
          value: ca-central-1
        - name: trilio.licenseSecretRef
          value: "true"
      syncPolicy:
        automated: {}
        retry:
          limit: 20
        syncOptions:
          - SkipDryRunOnMissingResource=true
    wordpress:
      name: wordpress
      namespace: wordpress
      argoProject: wordpress
      path: charts/all/wordpress
    wordpress-restore:
      name: wordpress-restore
      namespace: wordpress-restore
      argoProject: wordpress-restore
      path: charts/all/wordpress-restore
  imperative:
    # NOTE: We *must* use lists and not hashes. As hashes lose ordering once parsed by helm
    # The default schedule is every 10 minutes: imperative.schedule
    # Total timeout of all jobs is 1h: imperative.activeDeadlineSeconds
    # imagePullPolicy is set to always: imperative.imagePullPolicy
    # For additional overrides that apply to the jobs, please refer to
    # https://validatedpatterns.io/patterns/multicloud-gitops/mcg-imperative-actions/
    jobs:
      # -----------------------------------------------------------------------
      # Req 12 — E2E DR lifecycle automation
      # Phase 1: Enable Continuous Restore — creates CR BackupPlan; skips if Available
      # Phase 2: CR backup — backup using CR BackupPlan to activate spoke replication
      # Phase 3: Standard backup — backup using standard BackupPlan; skips if exists
      # Phase 4: Restore — restores latest standard backup to wordpress-restore
      # Phase 5: Aggregate E2E status; write ConfigMap; fail job if incomplete
      #          (VP framework surfaces failures in Job logs for alerting)
      #
      # Check E2E status at any time:
      #   oc get configmap trilio-dr-status -n imperative -o yaml
      # -----------------------------------------------------------------------
      # Phase 1: skips immediately once CR BackupPlan is Available
      - name: trilio-enable-cr
        playbook: ansible/playbooks/imperative-enable-cr.yaml
        timeout: 900

      # Phase 2: skip if CR BackupPlan not yet Available or CR backup already exists
      - name: trilio-cr-backup
        playbook: ansible/playbooks/imperative-cr-backup.yaml
        timeout: 1200

      # Phase 3: skip if Available standard backup already exists
      - name: trilio-backup
        playbook: ansible/playbooks/imperative-backup.yaml
        timeout: 1200

      # Phase 4: creates a Restore CR in wordpress-restore; skips if Completed restore exists
      - name: trilio-restore-standard
        playbook: ansible/playbooks/imperative-restore-standard.yaml
        timeout: 1800

      # Phase 5: aggregate status — runs last; fails job until all phases pass
      - name: trilio-e2e-status
        playbook: ansible/playbooks/imperative-e2e-status.yaml
        timeout: 120
  managedClusterGroups:
    exampleRegion:
      name: secondary
      acmlabels:
        - name: clusterGroup
          value: secondary
