clusterGroup:
  name: secondary

  namespaces:
    - external-secrets
    - external-secrets-operator:
        operatorGroup: true
        targetNamespaces: []
    - trilio-system:
        operatorGroup: true
        targetNamespaces: []
    - wordpress-restore

  subscriptions:
    eso:
      name: openshift-external-secrets-operator
      namespace: external-secrets-operator
      channel: stable-v1
    trilio:
      name: k8s-triliovault
      namespace: trilio-system
      channel: 5.3.x
      source: certified-operators
      installPlanApproval: Automatic

  applications:
    openshift-external-secrets:
      name: openshift-external-secrets
      namespace: external-secrets
      chart: openshift-external-secrets
      chartVersion: 0.0.*
    # Req 10: trilio-secrets runs at wave -1 so ESO creates the S3 and license
    # Secrets before trilio-operand (wave 0) attempts to apply the BackupTarget.
    # The Trilio admission webhook rejects a Target CR if aws-s3-login is absent.
    trilio-secrets:
      name: trilio-secrets
      namespace: trilio-system
      argoProject: trilio-operand
      path: charts/all/trilio-secrets
    # Req 10: SkipDryRunOnMissingResource=true lets ArgoCD apply the TrilioVaultManager
    # CR even though the child CRDs (targets.triliovault.trilio.io etc.) are not yet
    # registered. The operator registers them after TVM reconciles, and ArgoCD retries
    # until BackupTarget and friends apply successfully.
    trilio-operand:
      name: trilio-operand
      namespace: trilio-system
      argoProject: trilio-operand
      path: charts/all/trilio-operand
      overrides:
        - name: backupTarget.bucketName
          value: sa-demo-2
        - name: backupTarget.region
          value: ca-central-1
        - name: trilio.licenseSecretRef
          value: "true"
      syncPolicy:
        automated: {}
        retry:
          limit: 20
        syncOptions:
          - SkipDryRunOnMissingResource=true
    wordpress-restore:
      name: wordpress-restore
      namespace: wordpress-restore
      argoProject: wordpress-restore
      path: charts/all/wordpress-restore
  imperative:
    # NOTE: We *must* use lists and not hashes. As hashes lose ordering once parsed by helm
    # The default schedule is every 10 minutes: imperative.schedule
    # Total timeout of all jobs is 1h: imperative.activeDeadlineSeconds
    # imagePullPolicy is set to always: imperative.imagePullPolicy
    # For additional overrides that apply to the jobs, please refer to
    # https://validatedpatterns.io/patterns/multicloud-gitops/mcg-imperative-actions/
    jobs:
      # -----------------------------------------------------------------------
      # Req 12 — Spoke-side Continuous Restore automation
      # Phase 1: Validate CR pipeline has delivered ConsistentSets to this spoke.
      #          PASS when at least one Available ConsistentSet exists.
      #          Fails and retries every cycle until the CR pipeline has fired.
      # Phase 2: Restore from the latest Available ConsistentSet to wordpress-restore.
      #          Accelerated-RTO path: PVC data pre-staged locally by EventTarget.
      #          Skips if Completed restore already exists.
      #
      # Check status at any time:
      #   oc get configmap trilio-cr-status -n imperative -o yaml
      # -----------------------------------------------------------------------
      # Phase 1: validate ConsistentSet availability; fails until CR pipeline fires
      - name: trilio-cr-status
        playbook: ansible/playbooks/imperative-cr-status.yaml
        timeout: 120

      # Phase 2: restore from latest ConsistentSet; skips if Completed restore exists
      - name: trilio-cr-restore
        playbook: ansible/playbooks/imperative-cr-restore.yaml
        timeout: 1800
